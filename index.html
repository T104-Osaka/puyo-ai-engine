<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぷよクエ解析シミュレーター</title>
    <style>
        /* デザイン部分は変更なし */
        body { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 20px; line-height: 1.3; min-height: 100vh; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #d35400; font-size: 1.8em; text-align: center; margin-bottom: 20px; }
        .usage-section { background-color: rgba(52, 73, 94, 0.8); padding: 15px; border-radius: 10px; border-left: 6px solid #f1c40f; max-width: 1400px; margin: 0 auto 20px auto; font-size: 0.85em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .wrapper { display: flex; gap: 30px; justify-content: center; max-width: 1800px; margin: 0 auto; align-items: flex-start; }
        .side-input { flex: 0 0 380px; background-color: #34495e; padding: 15px; border-radius: 10px; border: 1px solid #7f8c8d; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(12, 1fr); grid-auto-flow: column; column-gap: 20px; row-gap: 6px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        .input-label { width: 75px; text-align: right; margin-right: 8px; font-size: 11px; color: #bdc3c7; white-space: nowrap; }
        .input-field { width: 85px; height: 22px; font-size: 13px; text-align: center; border-radius: 4px; border: 1px solid #bdc3c7; background: #ecf0f1; }
        .main-display { display: flex; flex-direction: column; gap: 25px; }
        .display-row { display: flex; gap: 25px; align-items: flex-end; }
        .board-wrapper { text-align: center; display: flex; flex-direction: column; align-items: flex-start; }
        .board-title { font-size: 0.85em; color: #ecf0f1; margin-bottom: 4px; border-left: 4px solid #3498db; padding-left: 8px; font-weight: bold; }
        .next-puyo-row { display: flex; margin-left: 48px; gap: 3px; margin-bottom: 8px; }
        .next-puyo-cell { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid rgba(127, 140, 141, 0.4); background-color: rgba(236, 240, 241, 0.05); box-shadow: inset 0 0 5px rgba(0,0,0,0.5); color: white; text-shadow: 1px 1px 2px #000; }
        .board-container { background-color: #2c3e50; padding: 8px; border-radius: 8px; border: 2px solid #7f8c8d; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 45px repeat(8, 32px); gap: 3px; }
        .cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; position: relative; }
        .data-cell { background-color: rgba(236, 240, 241, 0.05); border-radius: 50%; border: 1px solid rgba(127, 140, 141, 0.4); color: #fff; text-shadow: 1px 1px 2px #000; }
        .header-cell { color: #f1c40f; font-size: 11px; font-weight: bold; background-color: rgba(0,0,0,0.4); border-radius: 4px; }
        .origin-cell { width: 45px; font-size: 10px; color: #bdc3c7; background-color: rgba(0,0,0,0.5); }
        .trace-container { width: 100%; min-height: 40px; margin-bottom: 10px; background: rgba(26, 188, 156, 0.2); border: 1px solid #1abc9c; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        #trace-result { font-size: 1.3em; font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .btn { background: linear-gradient(to bottom, #e74c3c, #c0392b); color: white; padding: 12px; border: none; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px #952d23; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #952d23; }

        /* 統計エリア：来場者を消して2列に調整 */
        .stats-container { max-width: 1000px; margin: 40px auto 10px auto; display: flex; gap: 20px; justify-content: center; }
        .stat-card { flex: 1; max-width: 400px; background-color: #34495e; padding: 15px; border-radius: 10px; border-bottom: 3px solid #3498db; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-label { font-size: 0.8em; color: #bdc3c7; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-size: 1.6em; font-weight: bold; color: #3498db; font-family: 'Courier New', Courier, monospace; }

        .comment-section { max-width: 1400px; margin: 40px auto; background-color: #34495e; padding: 25px; border-radius: 12px; }
        .comment-textarea { width: 100%; height: 60px; border-radius: 6px; border: 1px solid #7f8c8d; padding: 10px; box-sizing: border-box; margin: 15px 0; }
        .submit-btn { background-color: #3498db; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1> ぷよクエ解析シミュレーター </h1>

    <div class="usage-section">
        <strong>💡 パーソナルスタッツ</strong><br>
        このブラウザでのあなたの合計探索実績が表示されます。
    </div>

    <div class="wrapper">
        <div class="side-input">
            <div id="input-section" class="input-grid"></div>
            <button class="btn" onclick="startSearch()">🚀 探索開始</button>
        </div>

        <div class="main-display">
            <div class="display-row">
                <div class="board-wrapper">
                    <div class="board-title">塗り替え前 (入力盤面)</div>
                    <div id="next-puyo-row" class="next-puyo-row"></div>
                    <div class="board-container"><div id="original-board" class="grid"></div></div>
                </div>
                <div class="board-wrapper">
                    <div class="trace-container"><div id="trace-result">-- 行 -- 列</div></div>
                    <div class="board-title">塗り替え後 (解析結果)</div>
                    <div class="board-container"><div id="output-board" class="grid"></div></div>
                </div>
            </div>
            <div class="display-row">
                <div class="board-wrapper">
                    <div class="board-title">塗り替え位置 1</div>
                    <div class="board-container"><div id="repaint-board-1" class="grid"></div></div>
                </div>
                <div class="board-wrapper">
                    <div class="board-title">塗り替え位置 2</div>
                    <div class="board-container"><div id="repaint-board-2" class="grid"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card"><div class="stat-label">あなたの総探索回数</div><div id="total-execs" class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">あなたの総探索パターン数</div><div id="total-patterns" class="stat-value">0</div></div>
    </div>

    <div class="comment-section">
        <div style="font-size: 1.1em; color: #3498db; font-weight: bold;">💬 掲示板 / フィードバック</div>
        <textarea class="comment-textarea" placeholder="メッセージを入力..."></textarea>
        <div style="text-align: right;"><button class="submit-btn">送信する</button></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // 1. Firebase 初期設定
    const firebaseConfig = {
        apiKey: "AIzaSyBxMptE0LD0sBSbJq1D3YHaM0hy36zu05g",
        authDomain: "puyo-logic-stats.firebaseapp.com",
        databaseURL: "https://puyo-logic-stats-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "puyo-logic-stats",
        storageBucket: "puyo-logic-stats.firebasestorage.app",
        messagingSenderId: "369432653847",
        appId: "1:369432653847:web:d09f669ac2a8ef4e61ac52",
        measurementId: "G-1GYB847L0E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    db.setForceWebSockets(true);
    db.goOnline();

    const inputLabels = ["盤面行 1:", "盤面行 2:", "盤面行 3:", "盤面行 4:", "盤面行 5:", "盤面行 6:", "+行 1:", "+行 2:", "+行 3:", "+行 4:", "+行 5:", "+行 6:", "BE行 1:", "BE行 2:", "BE行 3:", "BE行 4:", "BE行 5:", "BE行 6:", "N盤面:", "N+:", "塗 1:", "塗 2:", "実行時間:", "未設定:"];
    const placeholderHints = ["13121232", "25241231", "21545231", "45512452", "44132442", "35545511", "10001001", "01100111", "01011101", "11011011", "11110011", "01111011", "00000000", "10001100", "11001010", "01000111", "01101011", "00110110", "11111111", "11111111", "12", "12", "2", "0"];

    // 💡 個人の統計をブラウザに保存するための変数
    let myExecs = parseInt(localStorage.getItem('puyo_my_execs')) || 0;
    let myPatterns = parseInt(localStorage.getItem('puyo_my_patterns')) || 0;

    function updateStatsUI() {
        document.getElementById('total-execs').textContent = myExecs.toLocaleString();
        document.getElementById('total-patterns').textContent = myPatterns.toLocaleString();
    }

    window.addEventListener('DOMContentLoaded', () => {
        updateStatsUI(); // 初回表示

        // 入力欄生成
        const inputSection = document.getElementById('input-section');
        for (let i = 0; i < 24; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'input-row';
            rowDiv.innerHTML = `<label class="input-label">${inputLabels[i]}</label><input type="text" maxlength="8" class="input-field" placeholder="${placeholderHints[i]}">`;
            inputSection.appendChild(rowDiv);
        }

        const nextRow = document.getElementById('next-puyo-row');
        for (let i = 0; i < 8; i++) {
            const cell = document.createElement('div');
            cell.id = `next-cell-${i}`;
            cell.className = 'next-puyo-cell';
            nextRow.appendChild(cell);
        }

        createExcelGrid('original-board');
        createExcelGrid('output-board');
        createExcelGrid('repaint-board-1');
        createExcelGrid('repaint-board-2');
    });

    function createExcelGrid(gridId) {
        const grid = document.getElementById(gridId);
        for (let r = 0; r <= 6; r++) {
            for (let c = 0; c <= 8; c++) {
                const cell = document.createElement('div');
                if (r === 0 && c === 0) { cell.className = 'cell origin-cell'; cell.textContent = '行\\列'; }
                else if (r === 0) { cell.className = 'cell header-cell'; cell.textContent = c; }
                else if (c === 0) { cell.className = 'cell header-cell'; cell.style.width = '45px'; cell.textContent = r; }
                else { cell.className = 'cell data-cell'; cell.id = `${gridId}-cell-${(r-1)*8 + (c-1)}`; }
                grid.appendChild(cell);
            }
        }
    }

    function startSearch() {
        // 💡 探索回数をカウントアップ
        myExecs++;
        localStorage.setItem('puyo_my_execs', myExecs);
        updateStatsUI();

        const inputs = document.querySelectorAll('.input-field');
        const colors = ["transparent", "#ff3e3e", "#4da3ff", "#3eff3e", "#ffeb3e", "#ae81ff"];

        const nextColorsStr = (inputs[18].value || placeholderHints[18]).padStart(8, '1');
        const nextPlusStr = (inputs[19].value || placeholderHints[19]).padStart(8, '0');
        for (let i = 0; i < 8; i++) {
            const cell = document.getElementById(`next-cell-${i}`);
            if (!cell) continue;
            const colorIdx = parseInt(nextColorsStr[i]) || 0;
            cell.style.backgroundColor = colors[colorIdx];
            cell.textContent = nextPlusStr[i] === "1" ? "+" : "";
        }

        let n = 0;
        const combinedData = Array.from(inputs).map(i => {
            let val = i.value || placeholderHints[n++];
            return val.padStart(8, '0');
        }).join(",");

        if (typeof Module !== 'undefined' && Module.ccall) {
            Module.ccall('run_puyo_analysis', null, ['string'], [combinedData]);
        }
    }

    // 💡 WASMから呼ばれるパターン加算関数も個人用に変更
    window.addPatternCount = function(count) {
        if (!count || isNaN(count)) return;
        myPatterns += Number(count);
        localStorage.setItem('puyo_my_patterns', myPatterns);
        updateStatsUI();
    };

    window.updateUICell = function(gridId, index, colorIndex, isPlus = 0, isBonus = 0) {
        const cell = document.getElementById(`${gridId}-cell-${index}`);
        if (!cell) return;
        const colors = ["transparent", "#ff3e3e", "#4da3ff", "#3eff3e", "#ffeb3e", "#ae81ff"];
        if (colorIndex === 0 && (gridId === "original-board" || gridId === "output-board")) {
            cell.style.backgroundColor = "#ffdae9"; 
        } else {
            cell.style.backgroundColor = colors[colorIndex] || "rgba(255,255,255,0.05)";
        }
        let text = "";
        if (gridId !== "output-board") {
            if (isPlus) text += "+";
            if (isBonus) text += "B";
        }
        cell.textContent = text;
    };

    window.updateUITrace = function(row, col, colorIndex) {
        const colorCodes = ["#ccc", "#ff3e3e", "#4da3ff", "#3eff3e", "#ffeb3e", "#ae81ff"];
        const target = document.getElementById('trace-result');
        const colorCode = colorCodes[colorIndex] || "#fff";
        target.innerHTML = `${row} 行 ${col} 列 <span style="color: ${colorCode}; margin-left: 12px; font-size: 1.2em; text-shadow: 0 0 10px ${colorCode};">●</span>`;
    };
</script>
<script src="puyosim.js"></script>
</body>
</html>
