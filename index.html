<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぷよクエ解析シミュレーター</title>
    <style>
        /* 基本設定 */
        body { background-color: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 10px; line-height: 1.3; }
        h1 { color: #f1c40f; text-shadow: 1px 1px #d35400; font-size: 1.5em; text-align: center; margin-bottom: 10px; }

        /* 1. 上部：使い方の説明エリア */
        .usage-section {
            background-color: #34495e; padding: 10px; border-radius: 8px; border-left: 6px solid #f1c40f;
            max-width: 1400px; margin: 0 0 15px 0; text-align: left; font-size: 0.8em;
        }

        /* 2. メインレイアウト */
        .wrapper { 
            display: flex; 
            gap: 30px; 
            justify-content: flex-start; /* 左寄せ */
            max-width: 1600px; 
            margin: 0; 
            align-items: flex-start; 
        }

        /* 左側：入力エリア (15%目安) */
        .side-input { flex: 0 0 170px; background-color: #34495e; padding: 10px; border-radius: 6px; border: 1px solid #7f8c8d; }
        
        /* 右側：表示エリア全体 */
        .main-display { display: flex; flex-direction: column; gap: 20px; }

        /* 横並びを作るための行コンテナ */
        .display-row { display: flex; gap: 30px; align-items: flex-start; }

        /* 入力行の設定 */
        .input-row { display: flex; align-items: center; margin-bottom: 3px; }
        .input-label { width: 65px; text-align: right; margin-right: 8px; font-size: 10px; color: #bdc3c7; }
        .input-field { width: 80px; height: 18px; font-size: 11px; text-align: center; border-radius: 2px; border: 1px solid #bdc3c7; }

        /* 盤面エリア（Excelヘッダー付き） */
        .board-wrapper { text-align: center; }
        .board-title { font-size: 0.85em; color: #ecf0f1; margin-bottom: 4px; border-left: 4px solid #3498db; padding-left: 6px; text-align: left; }
        .board-container { background-color: #34495e; padding: 5px; border-radius: 4px; border: 1px solid #7f8c8d; display: inline-block; }
        .grid { display: grid; grid-template-columns: 40px repeat(8, 28px); gap: 2px; }
        
        .cell { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
        .data-cell { background-color: rgba(236, 240, 241, 0.1); border-radius: 50%; border: 1px solid rgba(127, 140, 141, 0.3); color: rgba(255,255,255,0.2); }
        .header-cell { color: #f1c40f; font-weight: bold; background-color: rgba(0,0,0,0.2); border-radius: 3px; }
        .origin-cell { width: 40px; font-size: 10px; color: #bdc3c7; background-color: rgba(0,0,0,0.3); }

        /* なぞり消し結果ボックス */
        .side-result { 
            width: 280px; background-color: #34495e; padding: 15px; border-radius: 6px; border: 2px solid #1abc9c; 
            /* 盤面の高さに合わせる */
            align-self: flex-start;
        }
        .result-title { font-size: 0.9em; color: #1abc9c; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #1abc9c; }
        .result-box { font-size: 1.3em; font-weight: bold; color: #fff; background: #16a085; padding: 15px 5px; border-radius: 4px; text-align: center; }

        /* コメント欄エリア */
        .comment-section { max-width: 1300px; margin: 40px 0 20px 0; background-color: #34495e; padding: 20px; border-radius: 8px; text-align: left; }
        .comment-textarea { width: 100%; height: 80px; border-radius: 4px; border: 1px solid #7f8c8d; padding: 10px; box-sizing: border-box; margin: 10px 0; }
        
        .btn { background-color: #e74c3c; color: white; padding: 8px; border: none; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 5px; }
        .submit-btn { background-color: #3498db; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🔥 ぷよクエ解析ツール 🔥</h1>

    <div class="usage-section">
        <strong>💡 使い方ガイド</strong><br>
        左側の入力欄にデータを入力し、「探索開始」を押してください。
    </div>

    <div class="wrapper">
        <div class="side-input">
            <div id="input-section"></div>
            <button class="btn">🚀 探索開始</button>
        </div>

        <div class="main-display">
            
            <div class="display-row">
                <div class="board-wrapper">
                    <div class="board-title">出力盤面 (結果)</div>
                    <div class="board-container"><div id="output-board" class="grid"></div></div>
                </div>

                <div class="side-result">
                    <div class="result-title">📍 解析結果</div>
                    <div style="font-size: 0.8em; color: #bdc3c7; margin-bottom: 5px;">なぞり消し開始位置</div>
                    <div id="trace-result" class="result-box">-- 行 -- 列</div>
                </div>
            </div>

            <div class="display-row">
                <div class="board-wrapper">
                    <div class="board-title">塗り替え盤面 1</div>
                    <div class="board-container"><div id="repaint-board-1" class="grid"></div></div>
                </div>

                <div class="board-wrapper">
                    <div class="board-title">塗り替え盤面 2</div>
                    <div class="board-container"><div id="repaint-board-2" class="grid"></div></div>
                </div>
            </div>

        </div>
    </div>

    <div class="comment-section">
        <div style="font-size: 1.1em; color: #3498db;">💬 コメント・掲示板</div>
        <textarea class="comment-textarea" placeholder="要望や報告を入力..."></textarea>
        <button class="submit-btn">送信する</button>
    </div>

    <script>
        const inputLabels = [
            "行 1:", "行 2:", "行 3:", "行 4:", "行 5:", "行 6:", 
            "設定 7:", "設定 8:", "設定 9:", "設定 10:",
            "設定 11:", "設定 12:", "設定 13:", "設定 14:", "設定 15:",
            "設定 16:", "設定 17:", "設定 18:", "設定 19:", "設定 20:"
        ];

        const inputSection = document.getElementById('input-section');
        for (let i = 0; i < 20; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'input-row';
            rowDiv.innerHTML = `<label class="input-label">${inputLabels[i]}</label><input type="text" maxlength="8" class="input-field" placeholder="00000000">`;
            inputSection.appendChild(rowDiv);
        }

        function createExcelGrid(gridId) {
            const grid = document.getElementById(gridId);
            for (let r = 0; r <= 6; r++) {
                for (let c = 0; c <= 8; c++) {
                    const cell = document.createElement('div');
                    if (r === 0 && c === 0) { cell.className = 'cell origin-cell'; cell.textContent = '行\\列'; }
                    else if (r === 0) { cell.className = 'cell header-cell'; cell.textContent = c; }
                    else if (c === 0) { cell.className = 'cell header-cell'; cell.style.width = '40px'; cell.textContent = r; }
                    else { cell.className = 'cell data-cell'; cell.id = `${gridId}-cell-${(r-1)*8 + (c-1)}`; }
                    grid.appendChild(cell);
                }
            }
        }
        
        createExcelGrid('output-board');
        createExcelGrid('repaint-board-1');
        createExcelGrid('repaint-board-2');
    </script>
</body>
</html>
