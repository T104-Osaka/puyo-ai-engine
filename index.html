<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぷよクエ解析シミュレーター</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { color: #f1c40f; text-shadow: 1px 1px #d35400; font-size: 1.5em; text-align: center; }

        /* =========================================
           全体のレイアウト (左入力 / 右盤面)
           ========================================= */
        .wrapper { display: flex; gap: 20px; align-items: flex-start; justify-content: center; }

        /* 左側：入力エリア (約30%) */
        .side-input { flex: 0 0 30%; max-width: 250px; background-color: #34495e; padding: 10px; border-radius: 8px; border: 2px solid #7f8c8d; }
        
        /* 右側：表示エリア (残り) */
        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; }

        /* 入力行の微調整 (小さめに) */
        .input-row { display: flex; align-items: center; margin-bottom: 4px; }
        .input-label { width: 50px; text-align: right; margin-right: 10px; font-size: 12px; color: #bdc3c7; }
        .input-field {
            width: 120px; height: 22px; font-size: 14px; letter-spacing: 2px;
            text-align: center; border-radius: 3px; border: 1px solid #bdc3c7;
        }

        /* 盤面エリアのスタイル */
        .board-wrapper { margin-bottom: 20px; text-align: center; }
        .board-title { font-size: 0.9em; color: #ecf0f1; margin-bottom: 5px; border-left: 4px solid #3498db; padding-left: 8px; text-align: left; }
        
        .board-container { background-color: #34495e; padding: 8px; border-radius: 8px; border: 2px solid #7f8c8d; display: inline-block; }
        .grid { display: grid; grid-template-columns: repeat(8, 30px); gap: 2px; }
        
        .cell {
            width: 30px; height: 30px; background-color: rgba(236, 240, 241, 0.1);
            border-radius: 50%; border: 1px solid rgba(127, 140, 141, 0.3);
            display: flex; align-items: center; justify-content: center; font-size: 9px; color: rgba(255,255,255,0.3);
        }

        .btn {
            background-color: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 25px;
            font-size: 1em; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 3px #c0392b;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px #c0392b; }
    </style>
</head>
<body>

    <h1>🔥 ぷよクエ解析ツール 🔥</h1>

    <div class="wrapper">
        <div class="side-input">
            <div id="input-section"></div>
            <button class="btn">🚀 探索開始</button>
        </div>

        <div class="main-display">
            
            <div class="board-wrapper">
                <div class="board-title">出力盤面 (結果)</div>
                <div class="board-container"><div id="output-board" class="grid"></div></div>
            </div>

            <div class="board-wrapper">
                <div class="board-title">塗り替え盤面 1</div>
                <div class="board-container"><div id="repaint-board-1" class="grid"></div></div>
            </div>

            <div class="board-wrapper">
                <div class="board-title">塗り替え盤面 2</div>
                <div class="board-container"><div id="repaint-board-2" class="grid"></div></div>
            </div>

        </div>
    </div>

    <script>
        // --- 入力エリア(20行)の生成 ---
        const inputSection = document.getElementById('input-section');
        for (let i = 1; i <= 20; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'input-row';
            rowDiv.innerHTML = `<label class="input-label">行 ${i}:</label><input type="text" maxlength="8" class="input-field" placeholder="00000000">`;
            inputSection.appendChild(rowDiv);
        }

        // --- 3つの盤面(6x8)を生成 ---
        function createGrid(gridId) {
            const grid = document.getElementById(gridId);
            for (let i = 0; i < 48; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = i;
                grid.appendChild(cell);
            }
        }
        
        createGrid('output-board');
        createGrid('repaint-board-1');
        createGrid('repaint-board-2');
    </script>
</body>
</html>
